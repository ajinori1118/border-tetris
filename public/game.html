<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>越境テトリス</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="game-page">
      <section class="panel game game-only">
        <div class="topbar">
          <div class="next-box">
            <span class="label">Next</span>
            <canvas id="next" width="88" height="88" aria-label="next piece"></canvas>
          </div>
        </div>
        <div id="topology-event" class="topology-event hidden" aria-live="polite"></div>
        <canvas id="game" width="320" height="640" aria-label="tetris board"></canvas>
        <div id="overlay" class="overlay hidden">
          <div>
            <h2 id="overlay-title">Paused</h2>
            <p id="overlay-text">Press resume to continue.</p>
          </div>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
