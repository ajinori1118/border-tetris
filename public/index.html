<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Border Tetris Lobby</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout lobby-layout">
      <section class="panel hero lobby-panel">
        <p class="eyebrow">Lobby</p>
        <h1>Border Tetris</h1>
        <p class="lead">
          プレイヤーネームを決めてゲームに参加します。多人数リングの動作確認用に、
          まずは名前を付けてプレイ画面へ入る最小構成です。
        </p>
        <form id="lobby-form" class="lobby-form">
          <label class="label" for="player-name">Player Name</label>
          <input
            id="player-name"
            name="player-name"
            class="lobby-input"
            type="text"
            maxlength="12"
            placeholder="Player"
            autocomplete="nickname"
          />
          <button type="submit">Join Game</button>
        </form>
      </section>

      <aside class="panel side lobby-side">
        <div class="controls">
          <span class="label">Controls</span>
          <ul>
            <li>`Left` / `Right`: move</li>
            <li>`Down`: accelerate fall</li>
            <li>`Up`: brake fall</li>
            <li>`X`: rotate right</li>
            <li>`Z`: rotate left</li>
            <li>`Space`: hard drop</li>
          </ul>
        </div>
      </aside>
    </main>

    <script src="/lobby.js"></script>
  </body>
</html>
